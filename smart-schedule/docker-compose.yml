# ============================================================
# 智能排课系统 - Docker Compose 部署配置
# 使用方法: docker-compose up -d
# ============================================================

version: '3.8'

services:
  # -----------------------------------------------------------
  # MySQL 5.7 数据库
  # -----------------------------------------------------------
  mysql:
    image: mysql:5.7
    container_name: smart-schedule-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smart_schedule_root_2025}
      MYSQL_DATABASE: smart_schedule
      MYSQL_USER: smart_schedule
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smart_schedule_2025}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init_schema.sql:/docker-entrypoint-initdb.d/01-init_schema.sql:ro
      - ./sql/init_data.sql:/docker-entrypoint-initdb.d/02-init_data.sql:ro
      - ./deploy/mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=500
      - --innodb-buffer-pool-size=256M
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-smart_schedule_root_2025}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - smart-schedule-net

  # -----------------------------------------------------------
  # Redis 缓存
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: smart-schedule-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-schedule-net

  # -----------------------------------------------------------
  # 后端服务
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-schedule-backend
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://smart_schedule:${MYSQL_PASSWORD:-smart_schedule_2025}@mysql:3306/smart_schedule
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      BACKUP_DIR: /app/backups
      LOG_DIR: /app/logs
      ENVIRONMENT: production
      PORT: 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_backups:/app/backups
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - smart-schedule-net

  # -----------------------------------------------------------
  # Nginx 反向代理
  # -----------------------------------------------------------
  nginx:
    image: nginx:1.24-alpine
    container_name: smart-schedule-nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
      # 如需HTTPS，取消下面两行注释并配置证书
      # - ./deploy/ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./deploy/ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - smart-schedule-net

# -----------------------------------------------------------
# 数据卷
# -----------------------------------------------------------
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_backups:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

# -----------------------------------------------------------
# 网络
# -----------------------------------------------------------
networks:
  smart-schedule-net:
    driver: bridge
