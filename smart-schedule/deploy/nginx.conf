# ============================================================
# 智能排课系统 - Nginx 配置文件
# 适用于非宝塔面板环境独立部署
# ============================================================

# 上游后端服务
upstream smart_schedule_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # 替换为你的域名，如 schedule.example.com

    # 字符集
    charset utf-8;

    # 最大请求体大小（用于数据导入）
    client_max_body_size 50m;

    # -------------------------------------------------------
    # 前端静态文件
    # -------------------------------------------------------
    location / {
        root /www/wwwroot/smart-schedule/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML文件不缓存（确保更新后用户获取最新版本）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # -------------------------------------------------------
    # 后端API代理
    # -------------------------------------------------------
    location /api/ {
        proxy_pass http://smart_schedule_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # 错误页面
        proxy_intercept_errors off;
    }

    # -------------------------------------------------------
    # WebSocket 代理
    # -------------------------------------------------------
    location /ws/ {
        proxy_pass http://smart_schedule_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket长连接超时
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -------------------------------------------------------
    # 安全设置
    # -------------------------------------------------------

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问敏感文件
    location ~* \.(env|sql|bak|old|orig|log|sh)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------
    # 日志设置
    # -------------------------------------------------------
    access_log /var/log/nginx/smart-schedule-access.log;
    error_log  /var/log/nginx/smart-schedule-error.log;

    # -------------------------------------------------------
    # Gzip 压缩
    # -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
}

